name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install build

      - name: Compile source tree
        run: python -m compileall -q src

      - name: Run test suite
        run: python -m unittest discover -s tests -v

      - name: Verify CLI entry point
        run: |
          manageroo --version
          manageroo --help >/dev/null

      - name: Build source and wheel distributions
        run: python -m build

      - name: Verify wheel installs cleanly
        shell: bash
        run: |
          python -m venv /tmp/manageroo-wheel-test
          /tmp/manageroo-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/manageroo-wheel-test/bin/python -m pip install dist/*.whl
          /tmp/manageroo-wheel-test/bin/manageroo --version
          /tmp/manageroo-wheel-test/bin/manageroo --help >/dev/null
